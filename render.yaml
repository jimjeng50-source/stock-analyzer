services:
  - type: web
    name: stock-analyzer
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: FINMIND_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
    healthCheckPath: /_stcore/health
